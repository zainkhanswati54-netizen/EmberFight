name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check all JS files
        run: |
          for f in $(find js -name "*.js"); do
            echo "Checking $f"
            node --check "$f"
          done

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f manifest.json
          test -f js/main.js
          test -f js/game.js
          echo "All required files present."
